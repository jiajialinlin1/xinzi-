name: Release macOS app

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build macOS app
        run: npm run build:mac

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/mac-arm64/Xinzi.app Xinzi.app.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Xinzi.app.zip
          generate_release_notes: true

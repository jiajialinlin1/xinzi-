<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>薪资计时器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="titlebar">
        <div>
          <p class="eyebrow">salary clock</p>
          <div class="title-row">
            <h1 id="pageTitle">薪资计时器</h1>
            <span id="statusPill" class="status-pill">读取中</span>
          </div>
        </div>
        <div class="xiaohei-scene" aria-hidden="true">
          <span class="xiaohei-line"></span>
          <span class="xiaohei-float">¥</span>
          <span class="xiaohei-body"></span>
        </div>
        <div class="toolbar">
          <button id="openMainButton" class="icon-button popover-only" type="button" title="打开桌面界面" aria-label="打开桌面界面">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="18" height="13" rx="2" />
              <path d="M8 21h8" />
              <path d="M12 17v4" />
            </svg>
          </button>
          <button id="showPopoverButton" class="icon-button main-only overview-action" type="button" title="显示状态栏窗口" aria-label="显示状态栏窗口">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16" />
              <path d="M7 12h10" />
              <path d="M10 17h4" />
            </svg>
          </button>
          <button id="openSettingsButton" class="icon-button main-only overview-action" type="button" title="设置" aria-label="设置">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.1 2.1 0 0 1-2.98 2.98l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21a2.1 2.1 0 0 1-4.2 0v-.07a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.05.05a2.1 2.1 0 0 1-2.98-2.98l.05-.05A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.66-1.1H2.9a2.1 2.1 0 0 1 0-4.2h.07A1.8 1.8 0 0 0 4.6 8a1.8 1.8 0 0 0-.36-1.98l-.05-.05A2.1 2.1 0 0 1 7.17 3l.05.05A1.8 1.8 0 0 0 9.2 3.4a1.8 1.8 0 0 0 1.1-1.66V1.7a2.1 2.1 0 0 1 4.2 0v.07a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.05-.05a2.1 2.1 0 0 1 2.98 2.98l-.05.05A1.8 1.8 0 0 0 19.4 8c.18.64.77 1.1 1.66 1.1h.04a2.1 2.1 0 0 1 0 4.2h-.07A1.8 1.8 0 0 0 19.4 15Z" />
            </svg>
          </button>
          <button id="saveSettingsButton" class="icon-button main-only settings-action" type="button" title="保存设置" aria-label="保存设置">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </button>
        </div>
      </header>

      <section class="overview-panel">
        <section class="summary-grid" aria-label="今日薪资概览">
          <article class="metric primary">
            <p>今日已赚</p>
            <strong id="earnedToday">¥0.00</strong>
            <span id="fishSummary" class="fish-summary">偷偷摸了00分钟<br />真正赚了¥0.00</span>
          </article>
          <article class="metric">
            <p>今日已工作时间</p>
            <strong id="workedTime">00时00分00秒</strong>
          </article>
          <article class="metric">
            <p>距离下班还剩</p>
            <strong id="remainingTime">00时00分00秒</strong>
          </article>
        </section>

        <section class="details">
          <div class="row">
            <span>累计窝囊费</span>
            <span class="metric-value">
              <strong id="monthlySalary">¥0.00</strong>
              <button class="metric-eye-button" type="button" data-metric-key="totalEarned" title="隐藏/显示累计窝囊费" aria-label="隐藏/显示累计窝囊费"></button>
            </span>
          </div>
          <div class="row">
            <span>每秒薪资</span>
            <span class="metric-value">
              <strong id="secondRate">¥0.0000</strong>
              <button class="metric-eye-button" type="button" data-metric-key="secondRate" title="隐藏/显示每秒薪资" aria-label="隐藏/显示每秒薪资"></button>
            </span>
          </div>
          <div class="row main-only-row">
            <span>在职天数</span>
            <span class="metric-value">
              <strong id="employmentDays">0 天</strong>
              <button class="metric-eye-button" type="button" data-metric-key="employmentDays" title="隐藏/显示在职天数" aria-label="隐藏/显示在职天数"></button>
            </span>
          </div>
          <div class="row main-only-row">
            <span>在此公司累计收入</span>
            <span class="metric-value">
              <strong id="totalEarned">¥0.00</strong>
              <button class="metric-eye-button" type="button" data-metric-key="companyTotal" title="隐藏/显示在此公司累计收入" aria-label="隐藏/显示在此公司累计收入"></button>
            </span>
          </div>
        </section>

        <section class="fish-details-card main-only">
          <div class="section-heading">
            <h2>今日摸鱼明细</h2>
          </div>
          <div id="fishDetailsList" class="fish-details-list"></div>
          <p id="fishDetailsEmpty" class="fish-details-empty">今天还没摸，清白得可疑。</p>
        </section>

        <section class="fish-panel popover-only" aria-label="摸鱼薪资">
          <div id="fishIdleControls" class="fish-controls">
            <button id="startFishingButton" class="fish-button" type="button">开始摸鱼</button>
            <div class="fish-minute-control">
              <button id="startFishingCountdownButton" class="fish-button" type="button">先摸</button>
              <input id="fishMinutesInput" type="number" min="0" step="1" value="10" aria-label="摸鱼分钟数" />
              <span>分钟</span>
            </div>
          </div>
          <button id="fishActiveButton" class="fish-button fish-active-button" type="button">摸鱼0分 怒赚¥0.00</button>
          <p id="fishUnavailableText" class="fish-unavailable-text">工作中才能摸鱼</p>
        </section>
      </section>

      <section id="fishOverlay" class="fish-overlay popover-only" aria-live="polite">
        <div id="fishCountdownView" class="fish-overlay-card">
          <p>准备摸鱼</p>
          <strong id="fishCountdownNumber">3</strong>
        </div>
        <div id="fishConfirmView" class="fish-overlay-card">
          <p>才摸了这么一会儿就要开始当牛马了吗</p>
          <div class="fish-confirm-actions">
            <button id="fishKeepWorkingButton" class="fish-button" type="button">继续当牛马</button>
            <button id="fishMoreButton" class="fish-button" type="button">再摸一会儿</button>
          </div>
        </div>
      </section>
      <section id="fishToast" class="fish-toast popover-only" aria-live="polite" hidden>
        <p id="fishToastText"></p>
      </section>

      <section class="settings-panel main-only" aria-label="设置">
        <section class="settings-card">
          <h2>工作时间</h2>
          <div class="form-grid">
            <label>
              上班时间
              <input id="workStart" type="time" />
            </label>
            <label>
              下班时间
              <input id="workEnd" type="time" />
            </label>
            <label>
              午休开始
              <input id="lunchStart" type="time" />
            </label>
            <label>
              午休结束
              <input id="lunchEnd" type="time" />
            </label>
            <label>
              每月工作日数
              <input id="monthlyWorkDays" type="number" min="1" step="0.01" />
            </label>
            <label>
              入职日期
              <input id="hireDate" type="date" />
            </label>
          </div>
        </section>

        <section class="settings-card">
          <div class="section-heading">
            <h2>工资历史</h2>
            <button id="addSalaryButton" class="small-button" type="button">新增工资</button>
          </div>
          <div id="salaryHistoryList" class="salary-history"></div>
        </section>

        <section class="settings-card">
          <div class="section-heading">
            <h2>摸鱼评价规则</h2>
            <button id="addFishReviewRuleButton" class="small-button" type="button">新增评价</button>
          </div>
          <div id="fishReviewRulesList" class="fish-review-rules"></div>
        </section>

        <section class="settings-card">
          <div class="section-heading">
            <h2>节假日与补班</h2>
            <button id="requestCalendarButton" class="icon-button" type="button" title="同步节假日" aria-label="同步节假日">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 2v4" />
                <path d="M16 2v4" />
                <rect x="3" y="4" width="18" height="18" rx="3" />
                <path d="M3 10h18" />
                <path d="M8 15h3" />
                <path d="M14 15h2" />
                <path d="M8 18h2" />
              </svg>
            </button>
          </div>
          <div class="calendar-status-panel" aria-live="polite">
            <div class="calendar-status-item">
              <span>数据状态</span>
              <strong id="calendarPermissionStatus">读取中</strong>
            </div>
            <div class="calendar-status-item">
              <span>今日判断</span>
              <strong id="calendarTodayType">读取中</strong>
            </div>
          </div>
          <div class="form-grid">
            <label>
              休息日覆盖
              <textarea id="holidayDates" rows="5" placeholder="每行一个日期，例如 2026-10-01"></textarea>
            </label>
            <label>
              补班日覆盖
              <textarea id="workdayDates" rows="5" placeholder="每行一个日期，例如 2026-10-10"></textarea>
            </label>
          </div>
        </section>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>

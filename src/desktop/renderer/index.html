      <section class="hero">
        <p>状态</p>
        <strong>准备构建</strong>
      </section>

      <section class="details">
        <div class="row">
          <span>项目类型</span>
          <strong>macOS 状态栏应用</strong>
        </div>
        <div class="row">
          <span>框架</span>
          <strong>Electron</strong>
        </div>
        <div class="row">
          <span>界面材质</span>
          <strong>Liquid Glass</strong>
        </div>
      </section>

    <script src="./renderer.js"></script>
